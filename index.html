<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Icarus Food Tool V8</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="app">
<h1>Icarus Food Tool V8</h1>

<div class="top-controls">
<label>Carnivore:
<select id="carnivore">
<option value="off">Off</option>
<option value="on">On</option>
</select>
</label>

<label>
<input type="checkbox" id="strict">
Strict in-game
</label>
</div>

<div class="search-box">
<input id="search" placeholder="Click or type to browse foods">
<div id="dropdown" class="dropdown hidden"></div>
</div>

<div id="selected"></div>
<div id="results"></div>

<div class="panel">
<h3>Scoring system</h3>
<p><b>Survival:</b> health, stamina, regen, resistances</p>
<p><b>Melee:</b> melee damage, speed</p>
<p><b>Ranged:</b> projectile, reload, crit</p>
<p><b>Efficiency:</b> value vs cost</p>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
