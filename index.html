<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Icarus Food Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <h1>Icarus Food Calculator</h1>
    <p>Pick up to 5 foods to view combined buffs and ingredients.</p>

    <section class="panel">
      <div id="selectors"></div>
      <button id="calcBtn">Calculate</button>
      <button id="clearBtn">Clear</button>
    </section>

    <section class="panel">
      <h2>Combined Buffs</h2>
      <div id="buffs"></div>
    </section>

    <section class="panel">
      <h2>Shopping List</h2>
      <div id="shopping"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
